model = "gpt-5.6-terra"
model_reasoning_effort = "medium"
notify = ["/Users/etienne.vandelden/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]
service_tier = "default"

[plugins."github@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."superpowers@openai-curated"]
enabled = true

[plugins."sites@openai-bundled"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[desktop]
appearanceLightCodeThemeId = "solarized"
appearanceDarkCodeThemeId = "solarized"
sansFontSize = 14
codeFontSize = 14
usePointerCursors = true
default-service-tier = "priority"
git-branch-prefix = "ai/"
git-pull-request-merge-method = "squash"
git-show-sidebar-pr-icons = true
followUpQueueMode = "queue"
reviewDelivery = "detached"
selected-avatar-id = "hoots"
dock-icon-preference = "codex-system"

[desktop.appearanceLightChromeTheme]
accent = "#b58900"
contrast = 45
ink = "#657b83"
opaqueWindows = false
surface = "#fdf6e3"

[desktop.appearanceLightChromeTheme.fonts]
code = "MonoLisa"

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#859900"
diffRemoved = "#dc322f"
skill = "#d33682"

[desktop.appearanceDarkChromeTheme]
accent = "#d30102"
contrast = 60
ink = "#839496"
opaqueWindows = false
surface = "#002b36"

[desktop.appearanceDarkChromeTheme.fonts]
code = "MonoLisa"

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#859900"
diffRemoved = "#dc322f"
skill = "#d33682"

[desktop.open-in-target-preferences]
global = "zed"

[features]
js_repl = false
memories = true

[mcp_servers.super-mcp]
url = "https://api.super.work/mcp"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "CODEX_GITHUB_PERSONAL_ACCESS_TOKEN"

[mcp_servers.fizzy]
url = "http://fizzy-mcp.home.arpa/mcp"
bearer_token_env_var = "FIZZY_PAT"

[mcp_servers.fizzy.tools.fizzy_create_card]
approval_mode = "approve"

[mcp_servers.fizzy.tools.fizzy_update_card]
approval_mode = "approve"
