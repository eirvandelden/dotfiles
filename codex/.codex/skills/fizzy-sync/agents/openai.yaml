---
interface:
  display_name: "Fizzy Sync"
  short_description: "Sync GitHub/Slack/Outlook/Slite work items into Fizzy, two-way for GitHub/Outlook"

dependencies:
  tools:
    - type: "mcp"
      value: "fizzy"
      description: "Fizzy MCP server (read/write task cards)"
    - type: "mcp"
      value: "github"
      description: "GitHub MCP server (read/write issues and Project Status field)"

policy:
  allow_implicit_invocation: false
